phase: phase2
sample:
  name: rn-login-demo
  type: expo-react-native
  golden_flow: login-smoke
  expected_home_text: "欢迎进入首页"
platforms:
  ios:
    enabled: true
    device_udid: ADA078B9-3C6B-4875-8B85-A7789F368816
    app_id: host.exp.Exponent
    launch_url: exp://127.0.0.1:8081
    runner_script: scripts/dev/run-phase1-ios.sh
    run_count_default: 5
    interruption_policy: configs/policies/interruption/ios.yaml
  android:
    enabled: true
    device_udid: emulator-5554
    app_id: host.exp.exponent
    launch_url: exp://127.0.0.1:8081
    adb_reverse:
      - tcp:8081 tcp:8081
    runner_script: scripts/dev/run-phase1-android.sh
    run_count_default: 5
    interruption_policy: configs/policies/interruption/android.yaml
assumptions:
  - Expo dev server is reachable on port 8081
  - Sample app remains a demo baseline, not a production readiness claim
  - Each run starts from a reset-based entry instead of in-app state reuse
phase3_validations:
  native_android:
    enabled: true
    sample_name: mobitru-native
    runner_script: scripts/dev/run-phase3-native-android.sh
    artifact_root: artifacts/phase3-native-android
    app_id: com.epam.mobitru
    run_count_default: 2
    flows:
      - flows/samples/native/mobitru-android-login.yaml
    assumptions:
      - The app is already installed, or NATIVE_ANDROID_APK_PATH points to a debug APK.
      - Android native validation currently covers the login harness flow.
  native_ios:
    enabled: true
    sample_name: mobitru-native
    runner_script: scripts/dev/run-phase3-native-ios.sh
    artifact_root: artifacts/phase3-native-ios
    app_id: com.epam.mobitru.demoapp
    run_count_default: 2
    flows:
      - flows/samples/native/mobitru-ios-baseline.yaml
      - flows/samples/native/mobitru-ios-login.yaml
    assumptions:
      - The app is already installed, or NATIVE_IOS_APP_PATH points to a simulator build artifact.
      - iOS native validation covers both baseline and input-style login flows.
  flutter_android:
    enabled: true
    sample_name: mobitru-flutter
    runner_script: scripts/dev/run-phase3-flutter-android.sh
    artifact_root: artifacts/phase3-flutter-android
    app_id: com.epam.mobitru
    run_count_default: 3
    flows:
      - flows/samples/flutter/mobitru-flutter-login-baseline.yaml
      - flows/samples/flutter/mobitru-flutter-login.yaml
    assumptions:
      - The app is already installed, or FLUTTER_APK_PATH points to a debug APK.
      - Current unified reporting covers Android Flutter validation only.
